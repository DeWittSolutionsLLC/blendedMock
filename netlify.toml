[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# SPA fallback — all non-file, non-function routes serve index.html
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
